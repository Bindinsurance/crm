// ===== SUPABASE CONFIG =====
const SUPABASE_URL = 'https://lhesgpbzwnchmumhcmpm.supabase.co';
let sbClient = null;
let sbUser = null;

function getSavedKey() {
  return localStorage.getItem('bind_anon_key') || '';
}

function saveKey(key) {
  localStorage.setItem('bind_anon_key', key);
}

async function initSupabase() {
  const key = getSavedKey();
  if (!key) return; // No key yet - will show setup screen
  sbClient = supabase.createClient(SUPABASE_URL, key);
  const { data: { session } } = await sbClient.auth.getSession();
  if (session) sbUser = session.user;
}

async function sbLogin(email, password) {
  const { data, error } = await sbClient.auth.signInWithPassword({ email, password });
  if (error) return { error: error.message };
  sbUser = data.user;
  return { user: data.user };
}

async function sbLogout() {
  await sbClient.auth.signOut();
  sbUser = null;
}

async function loadClients() {
  if (!sbClient || !sbUser) return null;
  let allData = [];
  let from = 0;
  const pageSize = 1000;
  let pageNum = 0;
  while (true) {
    pageNum++;
    const { data, error } = await sbClient.from('clients').select('*').order('created_at', { ascending: false }).range(from, from + pageSize - 1);
    if (error) { console.error('[CRM] Load error:', error); return null; }
    if (!data || data.length === 0) break;
    console.log(`[CRM] Página ${pageNum}: ${data.length} registros (total acumulado: ${allData.length + data.length})`);
    allData = allData.concat(data);
    if (data.length < pageSize) break;
    from += pageSize;
  }
  console.log(`%c[CRM] Total de clientes carregados: ${allData.length}`, 'color:#2563eb;font-weight:bold;font-size:14px');
  const data = allData;
  return data.map(r => ({
    id: r.id, fn: r.fn||'', ln: r.ln||'', email: r.email||'', phone: r.phone||'',
    language: r.language||'Português', city: r.city||'', state: r.state||'', county: r.county||'',
    services: r.services||['health'], carrier: r.carrier||'', ap: r.ap||0, an2: r.an2||0,
    source: r.source||'', status: r.status||'', visa: (r.visa||'').toLowerCase(), agent: r.agent||'',
    appMonth: r.app_month||'', consent: r.consent||'', months: r.months||0,
    effDate: r.eff_date||'', type: r.type||'Obamacare', val: r.val||0, mo: r.mo||0, yr: r.yr||0,
    renovado: r.renovado||'', cancelReason: r.cancel_reason||'',
    emailRenovEnviado: r.email_renov_enviado||false, notifUpdateEnviado: r.notif_update_enviado||false,
    obs: r.obs||'', carCarrier: r.car_carrier||'', policyNum: r.policy_num||'',
    effDateCar: r.eff_date_car||'', expireDateCar: r.expire_date_car||'',
    numCars: r.num_cars||0, deductible: r.deductible||0, valuePol: r.value_pol||0,
    carSource: r.car_source||'', carType: r.car_type||'personal'
  }));
}

function toDbRow(c) {
  // INTEGER columns must be whole numbers — Math.round prevents Supabase batch rejection
  const ri = v => Math.round(Number(v)||0);
  // NUMERIC columns accept decimals
  const rn = v => Number(v)||0;
  return {
    fn: c.fn||null, ln: c.ln||null, email: c.email||null, phone: c.phone||null,
    language: (c.language||'').toLowerCase()||null, city: c.city||null, state: c.state||null,
    county: c.county||null, services: c.services||[],
    carrier: (c.carrier||'').toLowerCase()||null, ap: ri(c.ap), an2: ri(c.an2),
    source: (c.source||'').toLowerCase()||null, status: (c.status||'').toLowerCase()||null,
    visa: (c.visa||'').toLowerCase()||null, agent: (c.agent||'').toLowerCase()||null, app_month: c.appMonth||null,
    consent: c.consent||null, months: ri(c.months),
    eff_date: c.effDate||null, type: (c.type||'').toLowerCase()||null,
    val: rn(c.val), mo: rn(c.mo), yr: rn(c.yr),
    renovado: c.renovado||null, cancel_reason: c.cancelReason||null,
    email_renov_enviado: !!c.emailRenovEnviado,
    notif_update_enviado: !!c.notifUpdateEnviado,
    obs: c.obs||null, car_carrier: c.carCarrier||null, policy_num: c.policyNum||null,
    eff_date_car: c.effDateCar||null, expire_date_car: c.expireDateCar||null,
    num_cars: ri(c.numCars), deductible: rn(c.deductible), value_pol: rn(c.valuePol),
    car_source: c.carSource||null, car_type: c.carType||null
  };
}

async function saveClient(c) {
  if (!sbClient || !sbUser) return;
  const row = toDbRow(c);
  if (typeof c.id === 'string' && c.id.length === 36) {
    // UUID = existing record
    await sbClient.from('clients').update(row).eq('id', c.id);
  } else {
    // New record - let DB generate UUID
    const { data } = await sbClient.from('clients').insert(row).select().single();
    return data?.id;
  }
}

async function deleteClient(id) {
  if (!sbClient || !sbUser) return;
  if (typeof id === 'string' && id.length === 36) {
    await sbClient.from('clients').delete().eq('id', id);
  }
}

async function clearAllData(){
  if(!confirm('⚠️ Apagar TODOS os dados?\n\nTodos os '+ST.data.length+' clientes serão removidos permanentemente.\n\nEsta ação não pode ser desfeita.'))return;
  if(sbClient&&sbUser){
    await sbClient.from('clients').delete().not('id','is',null);
  }
  ss({data:[]});
}

async function toggleField(id, field, value) {
  if (!sbClient || !sbUser) return;
  if (typeof id === 'string' && id.length === 36) {
    await sbClient.from('clients').update({ [field]: value }).eq('id', id);
  }
}

function getFiltered(){

    if(q&&!`${c.fn} ${c.ln} ${c.email||''} ${c.city||''} ${c.phone||''}`.toLowerCase().includes(q))return false;
    const f=ST.filters;
    const ci=(a,b)=>(a||'').toLowerCase()===(b||'').toLowerCase();
    if(f.agent&&!ci(c.agent,f.agent))return false;
    if(f.state&&!ci(c.state,f.state))return false;
    if(f.status){if(!ci(c.status,f.status))return false;}
    if(f.source&&!ci(c.source,f.source))return false;
    if(f.visa&&!ci(c.visa,f.visa))return false;
    if(f.type&&!ci(c.type,f.type))return false;
    if(f.language&&!ci(c.language,f.language))return false;
    if(f.service&&!(c.services||[]).includes(f.service))return false;
    if(f.carrier&&!ci(c.carrier,f.carrier))return false;
    if(f.county&&!ci(c.county,f.county))return false;
    if(f.cancelReason&&!ci(c.cancelReason,f.cancelReason))return false;
    if(f.consent){const has=c.consent==='X'||c.consent==='x';if(f.consent==='yes'&&!has)return false;if(f.consent==='no'&&has)return false;}
    if(f.emailRenovEnviado!==undefined&&f.emailRenovEnviado!==''){if(Boolean(c.emailRenovEnviado)!==Boolean(f.emailRenovEnviado==='true'))return false;}

    return true;
  });
}

);
ALTER TABLE clients ENABLE ROW LEVEL SECURITY;

function bindKeyEv() {

    ss({showKeySetup: true});
  });

      alert('Chave inválida. Deve começar com "eyJ"');

    saveKey(key);

  });

    ss({showKeySetup: false});

        // Re-render só quando o usuário pausa de digitar (220ms)

            const rows=XLSX.utils.sheet_to_json(ws,{header:1});
            const hdr=rows[1]||[];
            const hdr0=rows[0]||[]; // first row has individual column headers (hdr/rows[1] has the merged B2:W2 cell)
            if(!hdr.some(h=>h)&&!hdr0.some(h=>h))return; // skip empty sheets

            // Check both header rows for car sheet markers
            const allHdrVals=[...hdr,...hdr0];
            const isCar=allHdrVals.some(h=>String(h||'').toLowerCase().includes('policy number')||String(h||'').toLowerCase().includes('number of cars')||(String(h||'').toLowerCase().includes('carrie')&&String(h||'').toLowerCase().includes('effective')));
            const isCarSheet=sheetName.toLowerCase().includes('car')||sheetName.toLowerCase().includes('carro')||sheetName.toLowerCase().includes('auto')||isCar;
            const dataRows=rows.slice(2).filter(r=>r.some(v=>v!==undefined&&v!==null&&String(v).trim()!==''));

            if(dataRows.length===0)return;

            let sheetClients=[];

            if(isCarSheet){
              // Find commission column by searching headers (default r[15])
              let carCommCol=15;
              allHdrVals.forEach((v,ci)=>{const s=String(v||'').toLowerCase().trim();if(s.includes('commission')&&ci>0&&ci<20)carCommCol=ci;});
              sheetClients=dataRows.map((r,i)=>{
                const st=(String(r[3]||'').toLowerCase()==='cancelou'||String(r[3]||'').toLowerCase().includes('cancel'))?'cancel':'Application';
                const comm=Number(r[carCommCol])||0;
                return {id:'imp_'+(++counter),fn:String(r[0]||'').trim(),ln:String(r[1]||'').trim(),email:String(r[2]||''),phone:'',language:'Português',city:String(r[4]||''),state:String(r[5]||''),county:'',services:['car'],carrier:'',ap:0,an2:0,source:String(r[10]||''),status:st,visa:'',agent:String(r[11]||''),appMonth:'',consent:'',months:0,effDate:'',type:'Carro',val:comm,mo:comm,yr:comm*12,renovado:String(r[3]||''),cancelReason:st==='cancel'?String(r[3]||''):'',emailRenovEnviado:false,notifUpdateEnviado:false,obs:String(r[10]||''),carCarrier:String(r[6]||''),policyNum:String(r[7]||''),effDateCar:String(r[8]||''),expireDateCar:String(r[9]||''),numCars:Number(r[12])||0,deductible:Number(r[13])||0,valuePol:Number(r[14])||0,carSource:String(r[10]||''),carType:String(r[17]||'personal')};
              });
            } else {
              // Find Montly/Annualy column indices by searching BOTH header rows
              // rows[0] has individual column names; rows[1] has the merged B2:W2 cell (empty for most cols)
              let moColIdx=-1,yrColIdx=-1;
              [hdr0,hdr].forEach(h=>{
                h.forEach((v,ci)=>{
                  const s=String(v||'').toLowerCase().trim();
                  if(moColIdx<0&&(s==='montly'||s==='monthly'||s==='mo'))moColIdx=ci;
                  if(yrColIdx<0&&(s==='annualy'||s==='annually'||s==='annual'||s==='yr'))yrColIdx=ci;
                });
              });
              // Fix has26 detection: check rows[0] (hdr0) for 'phone' since rows[1] has merged cell
              const firstRow=dataRows[0]||[];
              const has26=hdr0.some(h=>String(h||'').toLowerCase().includes('phone'))||hdr.some(h=>String(h||'').toLowerCase().includes('phone'))||/^\+?[\d\s\(\)\-\.]{7,}$/.test(String(firstRow[3]||'').trim())||(firstRow.filter(v=>v!==undefined&&v!=='').length>=18);
              const has25=!has26&&(hdr0.some(h=>String(h||'')==='Enviado EMAIL')||hdr.some(h=>String(h||'')==='Enviado EMAIL')||(firstRow.filter(v=>v!==undefined&&v!=='').length>=15));
              sheetClients=dataRows.map((r,i)=>{
                const fn=String(r[0]||'').trim(),ln=String(r[1]||'').trim(),email=String(r[2]||'');
                const phone=has26?String(r[3]||''):'';
                const lang=has26?String(r[4]||''):'Português';
                const emailRenov=has26?(r[5]==='X'||r[5]==='x'):has25?(r[3]==='X'||r[3]==='x'):false;
                const renovado=has26?String(r[6]||''):has25?String(r[4]||''):'';
                const b=has26?7:has25?5:3;
                const rawStatus=String(r[b+7]||'');
                const knownActive=['application','new','cliente','ativo','active','aplicação'];
                const isActive=knownActive.includes(rawStatus.toLowerCase())||rawStatus.trim()==='';
                const status=isActive?'Application':'cancel';
                const appMonthRaw=r[b+10];
                let appMonth='';
                if(appMonthRaw instanceof Date){appMonth=appMonthRaw.toISOString().slice(0,7);}
                else if(appMonthRaw){appMonth=String(appMonthRaw).slice(0,7);}
                // Use directly-found column indices for mo/yr if available (bypass b-offset which can be wrong)
                const moVal=moColIdx>=0?(Number(r[moColIdx])||0):(Number(r[b+14])||0);
                const yrVal=yrColIdx>=0?(Number(r[yrColIdx])||0):(Number(r[b+15])||0);
                return {id:'imp_'+(++counter),fn,ln,email,phone,language:lang||'Português',city:String(r[b]||''),state:String(r[b+1]||''),county:String(r[b+2]||''),services:['health'],carrier:String(r[b+3]||''),ap:Number(r[b+4])||0,an2:Number(r[b+5])||0,source:String(r[b+6]||''),status,visa:String(r[b+8]||''),agent:String(r[b+9]||''),appMonth,consent:String(r[b+11]||''),months:Number(r[b+12])||0,effDate:'',type:String(r[b+16]||'Obamacare'),val:Number(r[b+13])||0,mo:moVal,yr:yrVal,renovado,cancelReason:isActive?'':rawStatus,emailRenovEnviado:emailRenov,notifUpdateEnviado:false,obs:'',carCarrier:'',policyNum:'',effDateCar:'',expireDateCar:'',numCars:0,deductible:0,valuePol:0,carSource:'',carType:'personal'};
              });
            }

            // Exclude footer/subtotal rows: rows where fn is purely numeric (e.g. "11" = SUBTOTAL count row)
            sheetClients=sheetClients.filter(c=>!/^\d+(\.\d+)?$/.test((c.fn||'').trim()));
            // Exclude total rows: rows where BOTH fn AND ln are blank (e.g. Excel SUM footer rows)
            sheetClients=sheetClients.filter(c=>!!(c.fn||'').trim()||!!(c.ln||'').trim());
            // Count and fix blank fn/ln — assign placeholder instead of silently dropping
            sheetClients.forEach(c=>{
              const hasMissingName=!c.fn||c.fn.trim()===''||!c.ln||c.ln.trim()==='';
              if(hasMissingName)blankNames++;
              if(!c.fn||c.fn.trim()==='')c.fn='(Sem Nome)';
              if(!c.ln||c.ln.trim()==='')c.ln='(Sem Sobrenome)';
            });
            allClients=allClients.concat(sheetClients);
            sheetSummary.push(`• ${sheetName}: ${sheetClients.length} clientes (${isCarSheet?'Carro':'Saúde'})`);
          });

          if(allClients.length===0){alert('Nenhum dado encontrado na planilha.');return;}
          ss({data:allClients});
          if(sbClient&&sbUser){
            (async()=>{try{
              // Smart merge: load existing keys from Supabase, only insert records not already present
              let existing=[];let pg=0;const PG=1000;
              while(true){
                const {data:pd,error:pe}=await sbClient.from('clients').select('fn,ln,phone').range(pg*PG,(pg+1)*PG-1);
                if(pe||!pd||pd.length===0)break;
                existing=existing.concat(pd);
                if(pd.length<PG)break;
                pg++;
              }
              // Build dedup key: fn|ln (lowercased, trimmed)
              const existingKeys=new Set(existing.map(r=>`${(r.fn||'').trim().toLowerCase()}|${(r.ln||'').trim().toLowerCase()}`));
              const newClients=allClients.filter(c=>{if(!(c.fn||'').trim()&&!(c.ln||'').trim())return false;
                const key=`${(c.fn||'').trim().toLowerCase()}|${(c.ln||'').trim().toLowerCase()}`;
                return !existingKeys.has(key);
              });
              const alreadyExisted=allClients.length-newClients.length;
              let inserted=0,failed=0,failedNames=[];
              if(newClients.length>0){
                const dbRows=newClients.map(toDbRow);
                // Try in batches of 100; if a batch fails, retry one by one to save every valid record
                for(let i=0;i<dbRows.length;i+=100){
                  const batch=dbRows.slice(i,i+100);
                  const {error:batchErr}=await sbClient.from('clients').insert(batch);
                  if(!batchErr){inserted+=batch.length;}
                  else{
                    // Batch failed — insert one by one to isolate the problem
                    for(let j=0;j<batch.length;j++){
                      const {error:rowErr}=await sbClient.from('clients').insert([batch[j]]);
                      if(!rowErr){inserted++;}
                      else{failed++;failedNames.push(`${newClients[i+j].fn} ${newClients[i+j].ln}: ${rowErr.message}`);}
                    }
                  }
                }
              }
              // Reload all clients from DB so UI shows full list (existing + new)
              const reloaded=await loadClients();
              if(reloaded)ss({data:reloaded});
              let msg='✅ Importação (merge inteligente) v2 concluída!\n\n'+sheetSummary.join('\n')+'\n\n';
              msg+='📊 Resultado:\n';
              msg+='• '+inserted+' novo(s) cliente(s) adicionado(s)\n';
              msg+='• '+alreadyExisted+' já existia(m) no banco — não duplicado(s)';
              if(failed>0)msg+='\n\n⚠️ '+failed+' registro(s) com erro ao salvar:\n'+failedNames.slice(0,5).join('\n')+(failedNames.length>5?'\n...e mais '+(failedNames.length-5):'');
              if(blankNames>0)msg+='\n\n⚠️ '+blankNames+' registro(s) com nome em branco marcados como "(Sem Nome)".';
              alert(msg);
            }catch(e){alert('Erro no merge: '+e.message);}})();
          }else{
            setTimeout(()=>{
              let msg='✅ Importação concluída (sem conexão com banco)!\n\n'+sheetSummary.join('\n')+'\n\nTotal: '+allClients.length+' clientes';
              if(blankNames>0)msg+='\n\n⚠️ '+blankNames+' registro(s) com nome em branco marcados como "(Sem Nome)".';
              alert(msg);
            },100);
          }
        }catch(err){alert('Erro ao importar: '+err.message);}
      };
      reader.readAsBinaryString(file);
    };
    inp.click();
  });
}

function updF(k,v){
  if(!ST.drawer)return;
  const form={...ST.drawer.form,[k]:v};
  if(k==='status'){ST.drawer={...ST.drawer,form};render();return;}
  const mo=(Number(form.ap)||0)*(Number(form.val)||0);
  const yr=mo*(Number(form.months)||0);
  form.mo=mo;form.yr=yr;
  ST.drawer={...ST.drawer,form};
  const em=document.getElementById('calcMo');const ey=document.getElementById('calcYr');
  if(em)em.textContent=fmt$(mo);if(ey)ey.textContent=fmt$(yr);
}
